                            </button>
                        </div>

                        <footer className="text-sm text-slate-500 font-medium pt-2">
                            האתר פתוח לכולם ללא צורך בהזדהות או סיסמה • מותאם למורי עברית כשפה שנייה
                        </footer>

                    </div>

                    {showBookletModal && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl max-w-md w-full p-6 shadow-2xl space-y-6 text-right">
                                <div className="flex items-center justify-between border-b pb-3">
                                    <h3 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                        <Icons.Sparkles /> בחירת חוברת לתכנון שיעור AI
                                    </h3>
                                    <button 
                                        onClick={() => setShowBookletModal(false)}
                                        className="text-slate-400 hover:text-slate-600 font-bold text-lg cursor-pointer"
                                    >
                                        ✕
                                    </button>
                                </div>
                                <p className="text-slate-600 text-sm font-medium">
                                    בחר את החוברת שעליה תרצה שהמערכת תתבסס עבור תכנון השיעור וניתוח אוצר המילים הקודם:
                                </p>
                                <div className="space-y-3">
                                    <button
                                        onClick={() => handleBookletChoice('חוברת רמה א-ב')}
                                        className="w-full bg-emerald-50 hover:bg-emerald-100 border border-emerald-300 text-emerald-900 font-bold p-4 rounded-2xl transition-colors text-right flex items-center justify-between cursor-pointer"
                                    >
                                        <span>חוברת רמה א-ב (מטרות 1-38)</span>
                                        <Icons.ArrowRight />
                                    </button>
                                    <button
                                        onClick={() => handleBookletChoice('חוברת רמה ג-ד')}
                                        className="w-full bg-teal-50 hover:bg-teal-100 border border-teal-300 text-teal-900 font-bold p-4 rounded-2xl transition-colors text-right flex items-center justify-between cursor-pointer"
                                    >
                                        <span>חוברת רמה ג-ד (מטרות 39-66)</span>
                                        <Icons.ArrowRight />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isEditingHeader && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl space-y-5 text-right max-h-[90vh] overflow-y-auto">
                                <div className="flex items-center justify-between border-b pb-3">
                                    <h3 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                        <span>עריכת שער האתר</span>
                                    </h3>
                                    <button 
                                        onClick={() => setIsEditingHeader(false)}
                                        className="text-slate-400 hover:text-slate-600 font-bold text-lg cursor-pointer"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <form onSubmit={handleSaveHeader} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">כותרת ראשית (כותרת האתר)</label>
                                        <input 
                                            type="text" 
                                            value={tempConfig.title}
                                            onChange={(e) => setTempConfig({...tempConfig, title: e.target.value})}
                                            className="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">כותרת משנה</label>
                                        <textarea 
                                            value={tempConfig.subtitle}
                                            onChange={(e) => setTempConfig({...tempConfig, subtitle: e.target.value})}
                                            className="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none resize-none h-20"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">קישור לתמונה או העלאת קובץ</label>
                                        <input 
                                            type="text" 
                                            value={tempConfig.imageUrl}
                                            onChange={(e) => setTempConfig({...tempConfig, imageUrl: e.target.value})}
                                            placeholder="כתובת URL של תמונה"
                                            className="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none mb-2"
                                        />
                                        <input 
                                            type="file" 
                                            accept="image/*"
                                            onChange={handleImageUpload}
                                            className="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer"
                                        />
                                    </div>

                                    <div className="flex justify-end gap-3 pt-4 border-t">
                                        <button
                                            type="button"
                                            onClick={() => setIsEditingHeader(false)}
                                            className="px-5 py-2.5 rounded-xl border border-slate-300 text-slate-700 font-bold hover:bg-slate-100 cursor-pointer text-sm"
                                        >
                                            ביטול
                                        </button>
                                        <button
                                            type="submit"
                                            className="px-6 py-2.5 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 cursor-pointer text-sm shadow"
                                        >
                                            שמור שינויים
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChatScreen = ({ booklet, mode, onBack }) => {
            const initialGreeting = mode === 'syllabus'
                ? `שלום! בחרת לחפש מיקומים ב**${booklet}**. כתוב שם נושא, מילה, מושג דקדוקי או תבנית ואמצא לך בדיוק היכן הם מופיעים במטרות הביצוע.`
                : `שלום! בחרת לתכנן שיעור מבוסס **${booklet}**. איזה נושא או מושג תרצה ללמד היום?`;

            const [messages, setMessages] = useState([
                { role: 'model', text: initialGreeting }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isLoading]);

            const handleSend = async (textCustom) => {
                const textToSend = textCustom || input;
                if (!textToSend.trim() || isLoading) return;

                const userText = textToSend.trim();
                if (!textCustom) setInput('');
                
                const updatedMessages = [...messages, { role: 'user', text: userText }];
                setMessages(updatedMessages);
                setIsLoading(true);

                try {
                    const apiHistory = updatedMessages.slice(1).map(msg => ({
                        role: msg.role,
                        parts: [{ text: msg.text }]
                    }));

                    const payload = {
                        contents: apiHistory,
                        tools: mode === 'lesson' ? [{ google_search: {} }] : [],
                        systemInstruction: {
                            parts: [{ text: getSystemPrompt(booklet, mode) }]
                        },
                    };

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates.length > 0) {
                        const botResponse = data.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'model', text: botResponse }]);
                    } else {
                        throw new Error("Invalid response format");
                    }
                } catch (error) {
                    console.error("API Error:", error);
                    setMessages(prev => [...prev, { 
                        role: 'model', 
                        text: 'מצטער, נתקלתי בבעיה טכנית בניסיון לעבד את הבקשה. נסה שוב.' 
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-5xl mx-auto bg-white shadow-2xl overflow-hidden rounded-none sm:rounded-2xl sm:h-[95vh] sm:mt-[2.5vh] sm:border border-emerald-100">
                    <header className="bg-gradient-to-r from-emerald-800 to-teal-900 text-white border-b border-emerald-700 p-4 flex items-center justify-between z-10 shadow-md">
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={onBack}
                                className="p-2 hover:bg-emerald-700/50 rounded-full transition-colors text-white focus:outline-none focus:ring-2 focus:ring-emerald-400 cursor-pointer"
                                title="חזרה למסך הראשי"
                            >
                                <Icons.ArrowRight />
                            </button>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">עוזר אישי למורה ({mode === 'syllabus' ? 'איתור מיקום' : 'תכנון שיעור'})</h1>
                                <p className="text-xs text-emerald-200 font-medium">{booklet}</p>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 space-y-6">
                        {messages.map((msg, index) => (
                            <div key={index} className={`flex w-full ${msg.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                                <div className={`flex max-w-[85%] sm:max-w-[75%] ${msg.role === 'user' ? 'flex-row' : 'flex-row-reverse'} gap-3 items-end`}>
                                    <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center shadow-sm ${msg.role === 'user' ? 'bg-emerald-600 text-white' : 'bg-white border border-emerald-200 text-emerald-800'}`}>
                                        {msg.role === 'user' ? <Icons.User /> : <Icons.Bot />}
                                    </div>
                                    <div 
                                        className={`p-4 shadow-sm text-[15px] leading-relaxed ${
                                            msg.role === 'user' 
                                                ? 'bg-emerald-600 text-white rounded-2xl rounded-br-sm' 
                                                : 'bg-white text-gray-800 rounded-2xl rounded-bl-sm border border-emerald-100'
                                        }`}
                                        dangerouslySetInnerHTML={msg.role === 'model' ? parseMarkdown(msg.text) : { __html: msg.text.replace(/\n/g, '<br/>') }}
                                    />
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex w-full justify-end">
                                <div className="flex max-w-[85%] flex-row-reverse gap-3 items-end">
                                    <div className="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center shadow-sm bg-white border border-emerald-200 text-emerald-800">
                                        <Icons.Bot />
                                    </div>
                                    <div className="p-4 shadow-sm bg-white text-gray-500 rounded-2xl rounded-bl-sm border border-emerald-100 flex items-center gap-2">
                                        <Icons.Loader /> <span>{mode === 'syllabus' ? 'סורק את החוברת ומחפש מיקומים...' : 'מנתח מטרות קודמות, אוצר מילים ומחפש חומרים ברשת...'}</span>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    <div className="bg-white border-t border-gray-200 p-4 sm:p-6">
                        <div className="max-w-4xl mx-auto relative flex items-center">
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={handleKeyDown}
                                placeholder={mode === 'syllabus' ? "כתוב נושא, מושג דקדוקי או מילה לחיפוש מיקום בחוברת..." : "כתוב נושא לתכנון שיעור ותרגילים..."}
                                className="w-full bg-slate-50 border border-slate-300 rounded-full pl-14 pr-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all resize-none overflow-hidden text-gray-800"
                                rows="1"
                                style={{ minHeight: '52px', maxHeight: '120px' }}
                            />
                            <button
                                onClick={() => handleSend()}
                                disabled={!input.trim() || isLoading}
                                className="absolute left-2 w-10 h-10 flex items-center justify-center bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-full transition-colors focus:outline-none shadow-sm cursor-pointer"
                            >
                                <Icons.Send />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState('home'); 
            const [selectedBooklet, setSelectedBooklet] = useState(null);
            const [selectedMode, setSelectedMode] = useState('syllabus');

            useEffect(() => {
                const link = document.createElement('link');
                link.href = 'https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap';
                link.rel = 'stylesheet';
                document.head.appendChild(link);
                
                document.body.style.fontFamily = "'Heebo', sans-serif";
                document.body.style.backgroundColor = "#F1F5F9"; 
            }, []);

            const handleSelectBooklet = (bookletName, mode) => {
                setSelectedBooklet(bookletName);
                setSelectedMode(mode);
                setScreen('chat');
            };

            const handleBackToHome = () => {
                setScreen('home');
                setSelectedBooklet(null);
                setSelectedMode('syllabus');
            };

            return (
                <div dir="rtl" className="antialiased text-slate-900 bg-slate-100 font-sans min-h-screen">
                    {screen === 'home' ? (
                        <HomeScreen onSelect={handleSelectBooklet} />
                    ) : (
                        <ChatScreen booklet={selectedBooklet} mode={selectedMode} onBack={handleBackToHome} />
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
